name: CLI Tool CI

on:
  push:
    branches: [master, feature-*]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: tool/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: ./tool

      - name: Run lint
        run: pnpm lint
        working-directory: ./tool

  test:
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: tool/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: ./tool

      - name: Run tests
        run: pnpm test
        working-directory: ./tool

  build:
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: tool/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: ./tool

      - name: Build
        run: pnpm build
        working-directory: ./tool
